{% extends 'base.html' %}
{% block title %}Edit Location - SmartID{% endblock %}
{% block sb_locations %}active{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-pin-map"></i> Edit Location</h1>
    <p>Update the details for this location.</p>
</div>

<div class="row g-3 g-lg-4 justify-content-center">
    <div class="col-12 col-lg-5">
        <div class="card">
            <div class="card-body">
                <div class="section-title"><i class="bi bi-pencil"></i> Edit Location</div>
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    <div class="field-wrap">
                        <label>Name</label>
                        <input type="text" name="name" class="form-control" value="{{ location.name }}" required>
                    </div>
                    <div class="field-wrap">
                        <label>Code</label>
                        <input type="text" name="code" class="form-control" value="{{ location.code }}" required>
                    </div>
                    <div class="field-wrap">
                        <label>Type</label>
                        <select name="location_type" class="form-select">
                            {% for val, label in location_types %}
                                <option value="{{ val }}" {% if location.location_type == val %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary btn-sm flex-fill"><i class="bi bi-check-lg"></i> Save Changes</button>
                        <a href="{% url 'dashboard:manage_locations' %}" class="btn btn-outline-secondary btn-sm flex-fill"><i class="bi bi-x-lg"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
