{% extends 'base.html' %}
{% block title %}Reset Password - SmartID{% endblock %}
{% block sb_users %}active{% endblock %}
{% block content %}
<div class="row justify-content-center auth-wrap">
    <div class="col-12 auth-col">
        <div class="card auth-card">
            <div class="card-body">
                <h2 class="auth-title">Reset Password</h2>
                <p class="auth-subtitle">Set a new password for <strong>{{ target_user.get_full_name }}</strong> <span style="color:var(--color-text-muted)">({{ target_user.institutional_id }})</span>.</p>
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    <div class="field-wrap">
                        <label for="new_password">New Password</label>
                        <input type="password" name="new_password" id="new_password" class="form-control" required minlength="8" placeholder="Minimum 8 characters">
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button type="submit" class="btn btn-primary">Reset Password</button>
                        <a href="{% url 'dashboard:manage_users' %}" class="btn btn-ghost">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
