{% extends 'base.html' %}
{% block title %}Dashboard - SmartID{% endblock %}
{% block sb_dashboard %}active{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-grid-1x2"></i> Dashboard</h1>
    <p>Welcome, <strong>{{ user.get_full_name }}</strong>.</p>
</div>
<div class="row g-3">
    <div class="col-md-6">
        <div class="card action-card">
            <div class="action-icon" style="background:var(--color-primary-bg);color:var(--color-primary)"><i class="bi bi-check2-square"></i></div>
            <h6>Mark Attendance</h6>
            <a href="{% url 'attendance:attendance_page' %}" class="btn btn-primary btn-sm">Go</a>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card action-card">
            <div class="action-icon" style="background:var(--color-info-bg);color:var(--color-info)"><i class="bi bi-person-circle"></i></div>
            <h6>View Profile</h6>
            <a href="{% url 'users:profile' %}" class="btn btn-outline-primary btn-sm">View</a>
        </div>
    </div>
</div>
{% endblock %}
