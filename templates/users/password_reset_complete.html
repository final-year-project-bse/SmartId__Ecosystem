{% extends 'base.html' %}
{% block title %}Password Reset Complete - SmartID{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-col">
        <div class="auth-card">
            <div class="card-body" style="text-align:center">
                <div style="width:64px;height:64px;border-radius:16px;background:var(--color-success-bg);color:var(--color-success);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1rem">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <div class="auth-title">Password Reset Complete</div>
                <div class="auth-subtitle">Your password has been successfully reset. You can now log in with your new password.</div>
                <a href="{% url 'users:login' %}" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
