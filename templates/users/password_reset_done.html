{% extends 'base.html' %}
{% block title %}Reset Link Sent - SmartID{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-col">
        <div class="auth-card">
            <div class="card-body" style="text-align:center">
                <div style="width:64px;height:64px;border-radius:16px;background:var(--color-success-bg);color:var(--color-success);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1rem">
                    <i class="bi bi-envelope-check"></i>
                </div>
                <div class="auth-title">Check Your Email</div>
                <div class="auth-subtitle">We've sent a password reset link to your email address. Please check your inbox and follow the instructions.</div>
                <a href="{% url 'users:login' %}" class="btn btn-primary w-100"><i class="bi bi-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
