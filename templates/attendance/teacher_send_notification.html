{% extends 'base.html' %}
{% block title %}Send Notice — {{ course.code }} - SmartID{% endblock %}
{% block sb_teach_dash %}active{% endblock %}
{% block content %}
<div class="row justify-content-center auth-wrap">
    <div class="col-12" style="max-width:560px">
        <div class="text-center mb-4">
            <div style="width:56px;height:56px;border-radius:14px;background:var(--color-info-bg);display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--color-info)"><i class="bi bi-megaphone"></i></div>
        </div>
        <div class="card auth-card">
            <div class="card-body">
                <h2 class="auth-title text-center">Send Notification</h2>
                <p class="auth-subtitle text-center">Send to all <strong>{{ enrolled_count }}</strong> students in <strong>{{ course.code }}</strong></p>
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    <div class="field-wrap">
                        <label style="font-weight:600;color:var(--color-text-primary)">Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g., Class Cancelled Tomorrow" required>
                    </div>
                    <div class="field-wrap">
                        <label style="font-weight:600;color:var(--color-text-primary)">Message</label>
                        <textarea name="message" class="form-control" rows="4" placeholder="Enter your message to students..." required></textarea>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary" style="flex:1"><i class="bi bi-send"></i> Send to {{ enrolled_count }} Students</button>
                        <a href="{% url 'attendance:teacher_class_attendance' course.pk %}" class="btn btn-ghost">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
