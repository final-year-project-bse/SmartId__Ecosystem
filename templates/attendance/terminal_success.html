{% extends 'base.html' %}
{% block title %}Success - SmartID{% endblock %}
{% block content %}
<div class="row justify-content-center" style="min-height:60vh;align-items:center">
    <div class="col-md-5">
        <div class="card text-center">
            <div class="card-body" style="padding:3rem 2rem">
                <div style="width:72px;height:72px;border-radius:18px;background:var(--color-success-bg);color:var(--color-success);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1rem"><i class="bi bi-check-lg"></i></div>
                <h3 style="font-weight:800;margin-bottom:0.5rem;color:var(--color-text-primary)">Attendance Recorded</h3>
                <p style="color:var(--color-text-secondary)">Your attendance has been successfully marked.</p>
                <a href="{% url 'attendance:terminal_login' %}" class="btn btn-primary btn-sm mt-2"><i class="bi bi-arrow-repeat"></i> Scan Again</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
