{% extends 'base.html' %}
{% block title %}Mark Attendance - SmartID{% endblock %}
{% block sb_attendance %}active{% endblock %}
{% block content %}
<div class="row justify-content-center auth-wrap">
    <div class="col-12 auth-col">
        <div class="text-center mb-4">
            <div style="width:48px;height:48px;border-radius:12px;background:var(--color-primary-bg);color:var(--color-primary);display:inline-flex;align-items:center;justify-content:center;font-size:1.3rem"><i class="bi bi-check2-square"></i></div>
        </div>
        <div class="card auth-card">
            <div class="card-body">
                <h2 class="auth-title text-center">Mark Attendance</h2>
                <p class="auth-subtitle text-center">Select your current location to record attendance.</p>
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    <div class="field-wrap">
                        <label for="location_id">Location</label>
                        <select name="location_id" id="location_id" class="form-select" required>
                            <option value="">-- Select location --</option>
                            {% for loc in locations %}
                            <option value="{{ loc.id }}">{{ loc.name }} ({{ loc.code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" style="height:var(--control-h)"><i class="bi bi-check-lg"></i> Record Attendance</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
